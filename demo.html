<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Header with String Drop Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #1b2a3a, #0e1620);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 2rem;
    }

    /* ---------- HEADER ---------- */
    .site-header {
      width: 100%;
      max-width: 1200px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 2rem;
      padding: 1rem 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    .header-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ----- LOGO ----- */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: #fff;
      font-weight: 600;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo i {
      font-size: 1.8rem;
      color: #6f9eff;
    }

    /* ----- NAVIGATION ----- */
    .nav-menu {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      list-style: none;
    }

    /* ----- NAV ITEM WITH STRING DROP ----- */
    .nav-item {
      position: relative;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
    }

    .nav-link {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      position: relative;
      z-index: 2;
    }

    .nav-link i {
      font-size: 0.7rem;
      transition: transform 0.3s ease;
    }

    .nav-item:hover .nav-link {
      color: #fff;
    }

    .nav-item:hover .nav-link i {
      transform: rotate(180deg);
    }

    /* ----- THE STRING (animated line) ----- */
    .string-drop {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 0;
      background: linear-gradient(180deg, #6f9eff, rgba(111, 158, 255, 0.1));
      transition: height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1;
      opacity: 0;
    }

    .nav-item:hover .string-drop {
      height: 40px;
      opacity: 1;
    }

    /* ----- THE DROPDOWN PANEL (hangs from string) ----- */
    .dropdown-panel {
      position: absolute;
      top: calc(100% + 40px);
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      min-width: 220px;
      background: rgba(20, 30, 45, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 1rem;
      padding: 0.6rem 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10;
    }

    .nav-item:hover .dropdown-panel {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    /* ----- DROPDOWN ITEMS ----- */
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1.5rem;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      border-left: 2px solid transparent;
    }

    .dropdown-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border-left-color: #6f9eff;
    }

    .dropdown-item i {
      width: 1.2rem;
      color: #6f9eff;
      font-size: 0.9rem;
    }

    .dropdown-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.05);
      margin: 0.3rem 1rem;
    }

    /* ----- HEADER ACTIONS ----- */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .btn-hire {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1.6rem;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      background: #6f9eff;
      border: none;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-hire:hover {
      background: #5a8ae0;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(111, 158, 255, 0.3);
    }

    .btn-menu {
      display: none;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0.4rem;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 768px) {
      .site-header {
        padding: 0.8rem 1.5rem;
        border-radius: 1.5rem;
        margin: 0 1rem;
      }

      .nav-menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(14, 22, 32, 0.98);
        backdrop-filter: blur(20px);
        flex-direction: column;
        padding: 1.5rem;
        gap: 0.5rem;
        border-radius: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        margin-top: 0.5rem;
      }

      .nav-menu.open {
        display: flex;
      }

      .btn-menu {
        display: block;
      }

      .btn-hire {
        padding: 0.5rem 1.2rem;
        font-size: 0.85rem;
      }

      .nav-item {
        padding: 0.4rem 0;
        width: 100%;
      }

      .string-drop {
        display: none;
      }

      .dropdown-panel {
        position: static;
        transform: none;
        opacity: 1;
        pointer-events: auto;
        background: transparent;
        backdrop-filter: none;
        box-shadow: none;
        border: none;
        padding: 0.5rem 0 0 1rem;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
        min-width: auto;
      }

      .nav-item:hover .dropdown-panel {
        max-height: 300px;
        transform: none;
      }

      .nav-item:hover .string-drop {
        display: none;
      }

      .dropdown-item {
        padding: 0.5rem 0.8rem;
      }
    }

    @media (max-width: 480px) {
      .logo {
        font-size: 1.2rem;
      }
      .logo i {
        font-size: 1.4rem;
      }
      .btn-hire span {
        display: none;
      }
      .btn-hire i {
        margin: 0;
      }
      .site-header {
        padding: 0.6rem 1rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <!-- Logo -->
      <a href="#" class="logo">
        <i class="fas fa-cube"></i>
        <span>engineer</span>
      </a>

      <!-- Navigation -->
      <nav class="nav-menu">
        <!-- Home (no dropdown) -->
        <div class="nav-item">
          <a href="#" class="nav-link">
            <span>Home</span>
          </a>
        </div>

        <!-- Career (with string drop) -->
        <div class="nav-item">
          <a href="#" class="nav-link">
            <span>Career</span>
            <i class="fas fa-chevron-down"></i>
          </a>
          <!-- The string that drops down -->
          <div class="string-drop"></div>
          <!-- The panel that hangs from the string -->
          <div class="dropdown-panel">
            <a href="#" class="dropdown-item">
              <i class="fas fa-briefcase"></i> Job Openings
            </a>
            <a href="#" class="dropdown-item">
              <i class="fas fa-user-tie"></i> Leadership
            </a>
            <a href="#" class="dropdown-item">
              <i class="fas fa-graduation-cap"></i> Internships
            </a>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item">
              <i class="fas fa-handshake"></i> Culture
            </a>
          </div>
        </div>

        <!-- Services (with string drop) -->
        <div class="nav-item">
          <a href="#" class="nav-link">
            <span>Services</span>
            <i class="fas fa-chevron-down"></i>
          </a>
          <div class="string-drop"></div>
          <div class="dropdown-panel">
            <a href="#" class="dropdown-item">
              <i class="fas fa-code"></i> Web Development
            </a>
            <a href="#" class="dropdown-item">
              <i class="fas fa-cloud"></i> Cloud Solutions
            </a>
            <a href="#" class="dropdown-item">
              <i class="fas fa-mobile-alt"></i> Mobile Apps
            </a>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item">
              <i class="fas fa-shield-alt"></i> Security Audit
            </a>
          </div>
        </div>

        <!-- Resources (with string drop) -->
        <div class="nav-item">
          <a href="#" class="nav-link">
            <span>Resources</span>
            <i class="fas fa-chevron-down"></i>
          </a>
          <div class="string-drop"></div>
          <div class="dropdown-panel">
            <a href="#" class="dropdown-item">
              <i class="fas fa-book"></i> Documentation
            </a>
            <a href="#" class="dropdown-item">
              <i class="fas fa-video"></i> Video Tutorials
            </a>
            <a href="#" class="dropdown-item">
              <i class="fas fa-blog"></i> Blog
            </a>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item">
              <i class="fas fa-download"></i> Free Resources
            </a>
          </div>
        </div>

        <!-- About (no dropdown) -->
        <div class="nav-item">
          <a href="#" class="nav-link">
            <span>About</span>
          </a>
        </div>
      </nav>

      <!-- Header Actions -->
      <div class="header-actions">
        <button class="btn-hire">
          <i class="fas fa-rocket"></i>
          <span>Hire Me</span>
        </button>
        <button class="btn-menu" aria-label="Toggle menu">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </header>

  <script>
    // Mobile menu toggle
    document.querySelector('.btn-menu').addEventListener('click', function() {
      document.querySelector('.nav-menu').classList.toggle('open');
    });
  </script>
</body>
</html>
